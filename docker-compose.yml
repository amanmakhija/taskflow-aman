version: "3.9"

services:
  db:
    image: postgres:15
    container_name: taskflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: taskflow-backend
    depends_on:
      - db
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"